name: Deploy to servidor-xirio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Build
        run: npm run build

      - name: Reiniciar aplicación
        run: pm2 restart informes-xirio
